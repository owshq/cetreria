name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fixture CI actualizado
        run: |
          npm run preflight:fixture
          git diff --exit-code backend/data/fixtures/preflight-ci.db.json

      - name: Preflight (read-only + integridad)
        run: npm run preflight:ci

      - name: Typecheck backend
        run: npm run typecheck:backend

      - name: Tests principales
        run: npm test

      - name: Tests deploy (auth + notificaciones)
        run: npm run test:deploy

      - name: Build produccion
        run: npm run build
